<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Установка файла</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 40px 24px 32px;
            text-align: center;
        }

        .package-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
            position: relative;
        }

        .package-icon::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 16px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .package-icon::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        .file-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }

        .body {
            padding: 24px;
            text-align: center;
        }

        .instruction {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #4b5563;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        .btn-cancel:active {
            transform: scale(0.98);
        }

        .btn-install {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .btn-install:hover {
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
            transform: translateY(-1px);
        }

        .btn-install:active {
            transform: translateY(0);
        }

        /* Анимация загрузки */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(240, 244, 248, 0.95);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loader {
            text-align: center;
            background: #ffffff;
            padding: 32px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #4b5563;
            font-size: 14px;
        }

        .loading.hide {
            display: none;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .container {
                border-radius: 14px;
            }

            .header {
                padding: 32px 20px 24px;
            }

            .package-icon {
                width: 56px;
                height: 56px;
            }

            .file-title {
                font-size: 16px;
            }

            .body {
                padding: 20px;
            }

            .btn {
                padding: 11px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="package-icon"></div>
            <div class="file-title" id="fileName">Файл</div>
        </div>
        
        <div class="body">
            <div class="instruction">Нажмите ниже для установки</div>
            
            <div class="buttons">
                <button class="btn btn-cancel" id="cancelBtn">Отменить</button>
                <button class="btn btn-install" id="installBtn">Установить</button>
            </div>
        </div>
    </div>
    
    <div class="loading hide" id="loading">
        <div class="loader">
            <div class="spinner"></div>
            <div class="loading-text">Подготовка к установке...</div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Получение данных из URL
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = decodeURIComponent(urlParams.get('name') || 'Файл');
        const installUrl = decodeURIComponent(urlParams.get('url') || '');
        
        // Установка названия файла
        document.getElementById('fileName').textContent = fileName;
        
        // Настройка цвета шапки Telegram
        tg.setHeaderColor('#f0f4f8');
        tg.setBackgroundColor('#f0f4f8');
        
        // Обработчик кнопки установки
        document.getElementById('installBtn').addEventListener('click', function() {
            if (installUrl) {
                // Показываем анимацию загрузки
                const loading = document.getElementById('loading');
                loading.classList.remove('hide');
                
                // Вибрация
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
                
                // Небольшая задержка для анимации
                setTimeout(() => {
                    // Открываем ссылку
                    window.location.href = installUrl;
                    
                    // Закрываем Mini App
                    setTimeout(() => {
                        tg.close();
                    }, 800);
                }, 300);
            } else {
                tg.showAlert('❌ Ошибка: ссылка для установки не найдена!');
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        });
        
        // Обработчик кнопки отмены
        document.getElementById('cancelBtn').addEventListener('click', function() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Анимация закрытия
            const container = document.querySelector('.container');
            container.style.animation = 'slideUp 0.3s ease-out reverse';
            
            setTimeout(() => {
                tg.close();
            }, 300);
        });
        
        // Проверка наличия ссылки
        if (!installUrl) {
            setTimeout(() => {
                tg.showAlert('⚠️ Внимание: ссылка для установки не настроена!\n\nОбратитесь к администратору.', () => {
                    tg.close();
                });
            }, 500);
        }
        
        // Поддержка основной кнопки Telegram
        tg.MainButton.setText('Установить');
        tg.MainButton.setParams({
            color: '#3b82f6',
            text_color: '#ffffff'
        });
        tg.MainButton.onClick(() => {
            document.getElementById('installBtn').click();
        });
        tg.MainButton.show();
    </script>
</body>
</html>
